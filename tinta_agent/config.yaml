name: "Tinta Agent"
description: "Connects your Home Assistant to Tinta Lab managed platform"
version: "2026.4.4"
slug: "tinta_agent"
init: false

arch:
  - aarch64
  - amd64
  - armv7

startup: services
boot: auto

homeassistant_api: true
hassio_api: true
hassio_role: homeassistant

map:
  - config:rw

options:
  tinta_client_id: ""
  tinta_agent_token: ""
  tinta_core_ws: "wss://api.tinta-lab.de/tinta/ws"
  tinta_external_url: ""

schema:
  tinta_client_id: str
  tinta_agent_token: str
  tinta_core_ws: str
  tinta_external_url: str?

image: "ghcr.io/tinta-lab/tinta-agent"
