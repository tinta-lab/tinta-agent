name: "Tinta Agent"
description: "Connects your Home Assistant to Tinta Lab managed platform"
version: "2026.4.1"
slug: "tinta_agent"
init: false

arch:
  - aarch64
  - amd64
  - armv7

startup: services
boot: auto

homeassistant: "2024.1.0"
hassio_role: homeassistant
hassio_api: true
homeassistant_api: true
ingress: false
ports: {}

map:
  - homeassistant_config:rw

options:
  tinta_client_id: ""
  tinta_agent_token: ""
  tinta_core_ws: "wss://api.tinta-lab.de/tinta/ws"
  tinta_external_url: ""
  log_level: "info"

schema:
  tinta_client_id: str
  tinta_agent_token: str
  tinta_core_ws: str
  tinta_external_url: str?
  log_level: str?

image: "ghcr.io/tinta-lab/tinta-agent:{version}"
